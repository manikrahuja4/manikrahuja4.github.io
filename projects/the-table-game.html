<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ocho's Ocean of Times Tables</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0A2647;
    --teal:#1B4965;
    --seafoam:#5FA8D3;
    --coral:#FF6B6B;
    --coral-deep:#E85A5A;
    --gold:#FFC857;
    --sand:#F6ECD9;
    --ink:#0A2647;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--navy);
    font-family:'Quicksand',sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #scene-canvas{
    position:fixed; inset:0; width:100%; height:100%; display:block;
  }
  .display{ font-family:'Baloo 2', sans-serif; }

  /* ---------- overlays common ---------- */
  .overlay{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; text-align:center; padding:24px;
    z-index:20;
  }
  .hidden{ display:none !important; }

  /* ---------- start screen ---------- */
  #start-screen{
    background: radial-gradient(ellipse at 50% 20%, rgba(95,168,211,0.35), rgba(10,38,71,0.85) 60%);
  }
  .title-card{
    background: rgba(10,38,71,0.55);
    border: 2px solid rgba(255,200,87,0.35);
    backdrop-filter: blur(6px);
    border-radius: 28px;
    padding: 36px 40px;
    max-width: 480px;
  }
  #start-screen h1{
    color: var(--sand);
    font-size: clamp(28px,6vw,44px);
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  #start-screen h1 span{ color: var(--gold); }
  #start-screen p{
    color: #CFE3EF;
    font-size: clamp(14px,3vw,17px);
    line-height:1.5;
    margin: 10px 0 22px;
  }
  .big-button{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size: clamp(17px,4vw,21px);
    color:#0A2647;
    background: linear-gradient(180deg, #FFD873, var(--gold));
    border: none;
    border-radius: 999px;
    padding: 14px 38px;
    cursor:pointer;
    box-shadow: 0 6px 0 #B8862F, 0 10px 18px rgba(0,0,0,0.35);
    transition: transform 0.08s ease;
  }
  .big-button:active{ transform: translateY(4px); box-shadow: 0 2px 0 #B8862F, 0 4px 10px rgba(0,0,0,0.3); }
  .big-button.hidden{ display:none; }

  #table-select{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:6px;
  }
  .table-chip{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size: 16px;
    color: var(--sand);
    background: rgba(95,168,211,0.18);
    border: 2px solid rgba(95,168,211,0.5);
    border-radius: 14px;
    padding: 10px 16px;
    cursor:pointer;
    transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .table-chip.all-chip{ background: rgba(255,200,87,0.15); border-color: rgba(255,200,87,0.5); }
  .table-chip:hover{ transform: translateY(-2px); }
  .table-chip.selected{
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
  }
  #selection-label{
    color: var(--gold);
    font-weight:600;
    font-size: 13px;
    min-height: 18px;
    margin-bottom: 14px;
  }

  /* ---------- HUD ---------- */
  #hud{
    position:fixed; inset:0; pointer-events:none; z-index:10;
    display:flex; flex-direction:column; justify-content:space-between;
    padding: 14px 16px 20px;
  }
  #top-bar{
    display:flex; flex-direction:column; align-items:center; gap:8px;
    pointer-events:none;
  }
  #dots{
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center;
    background:rgba(10,38,71,0.45); padding:8px 12px; border-radius:16px;
    backdrop-filter: blur(4px);
    max-width: 92vw;
  }
  .dot{
    width:14px; height:14px; border-radius:50%;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.25);
    transition: all 0.3s ease;
  }
  .dot.done{ background: var(--gold); border-color: var(--gold); }
  .dot.current{ background: var(--coral); border-color: #fff; transform: scale(1.25); }

  #trail{
    color:#CFE3EF; font-size:12px; letter-spacing:0.3px; text-align:center;
    background:rgba(10,38,71,0.35); padding:4px 12px; border-radius:999px;
    max-width: 90vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  #trail b{ color:var(--gold); }

  /* ---------- question card ---------- */
  #question-wrap{
    pointer-events:none;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  #question-card{
    pointer-events:auto;
    background: rgba(10,38,71,0.6);
    border: 2px solid rgba(255,200,87,0.3);
    backdrop-filter: blur(8px);
    border-radius: 24px;
    padding: 16px 22px 20px;
    width: min(92vw, 420px);
    text-align:center;
  }
  #equation{
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    color: var(--sand);
    font-size: clamp(28px,7vw,38px);
    margin: 2px 0 4px;
  }
  #feedback{
    min-height: 20px;
    font-weight:600;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  #answers{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .answer-btn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: clamp(19px,5vw,24px);
    color:#fff;
    background: linear-gradient(180deg, #FF8F8F, var(--coral));
    border: none;
    border-radius: 50%;
    width: 74px; height:74px;
    cursor:pointer;
    box-shadow: 0 5px 0 var(--coral-deep), 0 8px 14px rgba(0,0,0,0.3);
    transition: transform 0.08s ease;
  }
  .answer-btn:active{ transform: translateY(3px); }
  .answer-btn.correct{ background: linear-gradient(180deg,#FFE28A,var(--gold)); box-shadow:0 5px 0 #B8862F, 0 8px 14px rgba(0,0,0,0.3); }
  .answer-btn.wrong{ animation: shake 0.35s ease; background: linear-gradient(180deg,#9AA5B1,#6B7684); box-shadow:0 5px 0 #4c5560; }
  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
  }

  #hint-toggle{
    pointer-events:auto;
    font-family:'Quicksand',sans-serif; font-weight:700; font-size:13px;
    color: var(--navy);
    background: var(--seafoam);
    border:none; border-radius: 999px; padding:7px 16px; margin-top:10px;
    cursor:pointer;
  }
  #hint-panel{
    margin-top: 10px;
    display:flex; flex-wrap:wrap; gap:5px; justify-content:center;
    max-width: 100%;
  }
  .hint-group{
    display:grid; grid-template-columns: repeat(4, 9px); gap:3px;
    background: rgba(255,255,255,0.06); padding:5px; border-radius:8px;
  }
  .hint-dot{ width:9px; height:9px; border-radius:50%; background: var(--gold); }
  #hint-label{ color:#CFE3EF; font-size:12px; margin-top:6px; }

  #bottom-bar{ display:flex; justify-content:center; }

  /* ---------- victory screen ---------- */
  #victory-screen{
    background: radial-gradient(ellipse at 50% 30%, rgba(255,200,87,0.25), rgba(10,38,71,0.9) 65%);
  }
  #victory-screen .title-card h2{
    color: var(--gold); font-size: clamp(26px,6vw,38px); margin:0 0 4px;
  }
  #stars{ font-size: 40px; margin: 10px 0; letter-spacing: 6px; }
  #victory-screen p{ color:#CFE3EF; font-size:15px; margin: 6px 0 20px; }
</style>
</head>
<body>

<canvas id="scene-canvas"></canvas>

<div id="start-screen" class="overlay">
  <div class="title-card">
    <h1 class="display">Ocho's Ocean <span>of Times Tables</span></h1>
    <p>Pick a times table to explore with Ocho the octopus — or dive into all of them at once!</p>
    <div id="table-select">
      <button class="table-chip" data-table="2">2 ×</button>
      <button class="table-chip" data-table="3">3 ×</button>
      <button class="table-chip" data-table="4">4 ×</button>
      <button class="table-chip" data-table="5">5 ×</button>
      <button class="table-chip" data-table="6">6 ×</button>
      <button class="table-chip" data-table="7">7 ×</button>
      <button class="table-chip" data-table="8">8 ×</button>
      <button class="table-chip" data-table="9">9 ×</button>
      <button class="table-chip all-chip" data-table="all">All Tables</button>
    </div>
    <div id="selection-label">&nbsp;</div>
    <button class="big-button hidden" id="start-btn">Dive In 🐙</button>
  </div>
</div>

<div id="hud" class="hidden">
  <div id="top-bar">
    <div id="dots"></div>
    <div id="trail">Skip-counting by <span id="trail-table">6</span>: <span id="trail-text"></span></div>
  </div>

  <div id="question-wrap">
    <div id="question-card">
      <div id="equation" class="display">8 × 1 = ?</div>
      <div id="feedback"></div>
      <div id="answers"></div>
      <button id="hint-toggle">Show me the groups 👀</button>
      <div id="hint-panel"></div>
      <div id="hint-label"></div>
    </div>
  </div>

  <div id="bottom-bar"></div>
</div>

<div id="victory-screen" class="overlay hidden">
  <div class="title-card">
    <h2 class="display">Treasure Found!</h2>
    <div id="stars">⭐⭐⭐</div>
    <p id="victory-text">You mastered the 8 times table!</p>
    <button class="big-button" id="replay-btn">Dive Again 🐙</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   OCHO'S OCEAN OF 8s  —  a tiny 3D adventure for the 8x table
   ========================================================= */

/* ---------- game data ---------- */
const TABLES = [2,3,4,5,6,7,8,9];
const PER_TABLE = 12;
const GATE_SPACING = 18;
const TOTAL = TABLES.length * PER_TABLE; // world is always built at full size (48 gates)
let activeTotal = TOTAL; // how many of those gates the current selection actually uses
let selectedTable = null; // 6,7,8,9 or 'all'
let order = [];

function buildOrder(selection){
  const ord = [];
  if(selection === 'all'){
    TABLES.forEach(tbl=>{
      for(let n=1;n<=PER_TABLE;n++) ord.push({table:tbl, n});
    });
  } else {
    for(let n=1;n<=PER_TABLE;n++) ord.push({table:selection, n});
  }
  return ord;
}
order = buildOrder('all'); // default fill so world-building math below has valid numbers

let currentIndex = 0;
let firstTryCorrectCount = 0;
let usedFirstTryThisQuestion = true;
let solvedTrail = [];
let hintShown = false;

/* ---------- audio (tiny, no assets) ---------- */
let audioCtx = null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function blip(freqs, dur=0.12, type='sine', gain=0.05){
  if(!audioCtx) return;
  let t = audioCtx.currentTime;
  freqs.forEach((f,i)=>{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = f;
    g.gain.value = gain;
    o.connect(g); g.connect(audioCtx.destination);
    const start = t + i*dur;
    g.gain.setValueAtTime(gain, start);
    g.gain.exponentialRampToValueAtTime(0.001, start+dur);
    o.start(start); o.stop(start+dur);
  });
}
function playCorrect(){ blip([523.25,659.25,783.99], 0.11, 'triangle', 0.06); }
function playWrong(){ blip([160], 0.18, 'sawtooth', 0.04); }
function playWin(){ blip([523.25,659.25,783.99,1046.5], 0.14, 'triangle', 0.07); }

/* ---------- three.js setup ---------- */
const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const colorShallow = new THREE.Color(0x1B6E8C);
const colorDeep = new THREE.Color(0x040F22);
scene.background = colorShallow.clone();
scene.fog = new THREE.FogExp2(colorShallow.getHex(), 0.018);

const camera = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.1, 400);
const BASE_Y = 1.2;
camera.position.set(0, BASE_Y, 8);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* lighting */
const hemi = new THREE.HemisphereLight(0xBFE3F5, 0x0A2647, 0.9);
scene.add(hemi);
const sun = new THREE.PointLight(0xEFFBFF, 0.8, 60);
sun.position.set(4, 12, 10);
scene.add(sun);
const fillLight = new THREE.PointLight(0xFFC857, 0.5, 30);
fillLight.position.set(-3,2,4);
scene.add(fillLight);

/* ocean floor (sandy ribbon following the whole tunnel) */
const floorGeo = new THREE.PlaneGeometry(60, (TOTAL+3)*GATE_SPACING, 1, 1);
const floorMat = new THREE.MeshStandardMaterial({color:0xE8D6A3, roughness:1, metalness:0});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.set(0, -3.4, -((TOTAL+1)*GATE_SPACING)/2 + 6);
scene.add(floor);

/* gentle coral decor dotted along floor */
const decorGeo = new THREE.ConeGeometry(0.4, 1.1, 6);
for(let i=0;i<40;i++){
  const decorMat = new THREE.MeshStandardMaterial({color: i%2? 0xFF6B6B:0xFFC857, roughness:0.7});
  const c = new THREE.Mesh(decorGeo, decorMat);
  c.position.set((Math.random()-0.5)*24, -3.1, -Math.random()*(TOTAL+2)*GATE_SPACING+10);
  c.rotation.y = Math.random()*Math.PI;
  scene.add(c);
}

/* ---------- gates ---------- */
const gates = [];
const gateGeo = new THREE.TorusGeometry(3.1, 0.35, 16, 40);
for(let i=0;i<TOTAL;i++){
  const mat = new THREE.MeshStandardMaterial({color:0xFF6B6B, roughness:0.5, metalness:0.1, emissive:0x000000});
  const gate = new THREE.Mesh(gateGeo, mat);
  gate.position.set(0, 1.0, -(i+1)*GATE_SPACING);
  scene.add(gate);
  gates.push(gate);
}

/* ---------- treasure chest at the end ---------- */
let treasureZ = -(TOTAL+1)*GATE_SPACING;
const chestGroup = new THREE.Group();
const chestBase = new THREE.Mesh(
  new THREE.BoxGeometry(2.6,1.4,1.7),
  new THREE.MeshStandardMaterial({color:0x8B5A2B, roughness:0.6})
);
chestBase.position.y = 0.7;
const chestLid = new THREE.Mesh(
  new THREE.BoxGeometry(2.7,0.5,1.8),
  new THREE.MeshStandardMaterial({color:0xA9722F, roughness:0.6})
);
chestLid.position.set(0, 1.55, -0.85);
chestLid.geometry.translate(0,0,0.9);
const chestGlow = new THREE.PointLight(0xFFC857, 0, 12);
chestGlow.position.set(0,2,0);
chestGroup.add(chestBase, chestLid, chestGlow);
chestGroup.position.set(0, -2.6, treasureZ - 6);
scene.add(chestGroup);

/* ---------- Ocho the octopus mascot ---------- */
const octoGroup = new THREE.Group();
const mantleMat = new THREE.MeshStandardMaterial({color:0xFF8FB1, roughness:0.45});
const mantle = new THREE.Mesh(new THREE.SphereGeometry(0.85, 24, 24), mantleMat);
octoGroup.add(mantle);

function makeEye(x){
  const eyeGroup = new THREE.Group();
  const white = new THREE.Mesh(new THREE.SphereGeometry(0.22,12,12), new THREE.MeshStandardMaterial({color:0xffffff}));
  const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.11,10,10), new THREE.MeshStandardMaterial({color:0x0A2647}));
  pupil.position.z = 0.16;
  eyeGroup.add(white, pupil);
  eyeGroup.position.set(x, 0.25, 0.72);
  return eyeGroup;
}
octoGroup.add(makeEye(-0.32), makeEye(0.32));

const tentacles = [];
const TENT_COUNT = 8;
for(let i=0;i<TENT_COUNT;i++){
  const tGroup = new THREE.Group();
  const segCount = 4;
  let prevRadius = 0.22;
  let yCursor = 0;
  for(let s=0; s<segCount; s++){
    const segLen = 0.42;
    const nextRadius = prevRadius*0.72;
    const segGeo = new THREE.CylinderGeometry(nextRadius, prevRadius, segLen, 8);
    segGeo.translate(0, -segLen/2, 0);
    const segMat = new THREE.MeshStandardMaterial({color:0xFF8FB1, roughness:0.5});
    const seg = new THREE.Mesh(segGeo, segMat);
    seg.position.y = -yCursor;
    tGroup.add(seg);
    yCursor += segLen;
    prevRadius = nextRadius;
  }
  const angle = (i/TENT_COUNT)*Math.PI*2;
  tGroup.position.set(Math.cos(angle)*0.55, -0.55, Math.sin(angle)*0.55);
  tGroup.rotation.x = Math.PI*0.55;
  tGroup.rotation.z = Math.cos(angle)*0.5;
  tGroup.rotation.y = angle;
  tGroup.userData.phase = i*0.8;
  tGroup.userData.baseRotX = tGroup.rotation.x;
  tGroup.userData.baseRotZ = tGroup.rotation.z;
  octoGroup.add(tGroup);
  tentacles.push(tGroup);
}
scene.add(octoGroup);

/* octopus celebration pulse (lights up tentacles 1..8 in sequence) */
let celebrateT = -1;
function triggerCelebration(){ celebrateT = 0; }

/* ---------- fish (ambient life) ---------- */
const fish = [];
const fishGeo = new THREE.ConeGeometry(0.18, 0.6, 6);
for(let i=0;i<16;i++){
  const mat = new THREE.MeshStandardMaterial({color: [0xFFC857,0x5FA8D3,0xFF8FB1][i%3], roughness:0.5});
  const f = new THREE.Mesh(fishGeo, mat);
  f.rotation.z = Math.PI/2;
  f.position.set((Math.random()-0.5)*14, Math.random()*6-1, -Math.random()*(TOTAL+2)*GATE_SPACING);
  f.userData = {phase: Math.random()*Math.PI*2, speed: 0.4+Math.random()*0.5, baseX:f.position.x, amp: 2+Math.random()*3};
  scene.add(f);
  fish.push(f);
}

/* ---------- rising bubbles ---------- */
const bubbles = [];
const bubbleGeo = new THREE.SphereGeometry(1,8,8);
const bubbleMat = new THREE.MeshStandardMaterial({color:0xEFFBFF, transparent:true, opacity:0.35, roughness:0.2});
for(let i=0;i<50;i++){
  const b = new THREE.Mesh(bubbleGeo, bubbleMat);
  const scale = 0.03+Math.random()*0.09;
  b.scale.setScalar(scale);
  b.position.set((Math.random()-0.5)*16, Math.random()*10-4, -Math.random()*(TOTAL+2)*GATE_SPACING);
  b.userData = {speed: 0.5+Math.random()*0.8};
  scene.add(b);
  bubbles.push(b);
}

/* ---------- burst particles (on correct answer) ---------- */
let bursts = [];
function spawnBurst(pos, color){
  for(let i=0;i<26;i++){
    const geo = new THREE.SphereGeometry(0.09,6,6);
    const mat = new THREE.MeshStandardMaterial({color, transparent:true, opacity:1});
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const dir = new THREE.Vector3((Math.random()-0.5), Math.random()*0.6+0.2, (Math.random()-0.5)).normalize();
    const speed = 2+Math.random()*3;
    p.userData = {vel: dir.multiplyScalar(speed), life:1.0};
    scene.add(p);
    bursts.push(p);
  }
}

/* ---------- camera travel ---------- */
let camAnim = null; // {fromZ,toZ,duration,elapsed}
function restZFor(i){ return -(i)*GATE_SPACING + 9; } // camera hangs 9 units before gate i (0-indexed)
camera.position.z = restZFor(0);

function easeInOutQuad(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

function travelTo(targetZ, duration, onDone){
  camAnim = {fromZ: camera.position.z, toZ: targetZ, duration, elapsed:0, onDone};
}

/* ---------- animation loop ---------- */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // idle bob & sway
  const bob = Math.sin(t*0.8)*0.15;
  camera.position.y = BASE_Y + bob;
  camera.rotation.z = Math.sin(t*0.4)*0.02;
  camera.rotation.x = Math.sin(t*0.5)*0.01;

  // camera travel animation
  if(camAnim){
    camAnim.elapsed += dt;
    const p = Math.min(camAnim.elapsed / camAnim.duration, 1);
    const eased = easeInOutQuad(p);
    camera.position.z = camAnim.fromZ + (camAnim.toZ - camAnim.fromZ)*eased;
    if(p>=1){
      const cb = camAnim.onDone;
      camAnim = null;
      if(cb) cb();
    }
  }

  // depth-based background/fog color
  const depthT = Math.min(Math.max((-camera.position.z)/((activeTotal+1)*GATE_SPACING),0),1);
  const bgColor = colorShallow.clone().lerp(colorDeep, depthT);
  scene.background = bgColor;
  scene.fog.color = bgColor;

  // octopus follows camera, sits lower-left of view
  const offset = new THREE.Vector3(-2.0, -1.1, -3.4).applyQuaternion(camera.quaternion);
  octoGroup.position.copy(camera.position).add(offset);
  octoGroup.rotation.y = camera.rotation.y + Math.PI + Math.sin(t*0.6)*0.15;

  // tentacle wave
  tentacles.forEach((tg)=>{
    const wobble = Math.sin(t*2.2 + tg.userData.phase)*0.22;
    tg.rotation.x = tg.userData.baseRotX + wobble*0.4;
    tg.rotation.z = tg.userData.baseRotZ + wobble;
  });

  // celebration: light tentacles up 1..8 in sequence
  if(celebrateT >= 0){
    celebrateT += dt*6;
    const activeIdx = Math.floor(celebrateT);
    tentacles.forEach((tg,i)=>{
      const mat = tg.children[0].material;
      mat.emissive = mat.emissive || new THREE.Color(0x000000);
      mat.emissive.set(i===activeIdx ? 0xFFC857 : 0x000000);
    });
    if(celebrateT > TENT_COUNT+2){
      celebrateT = -1;
      tentacles.forEach(tg=> tg.children[0].material.emissive.set(0x000000));
    }
  }

  // fish swim
  fish.forEach(f=>{
    f.position.x = f.userData.baseX + Math.sin(t*f.userData.speed + f.userData.phase)*f.userData.amp;
    f.rotation.y = Math.cos(t*f.userData.speed + f.userData.phase) > 0 ? 0 : Math.PI;
  });

  // bubbles rise
  bubbles.forEach(b=>{
    b.position.y += dt*b.userData.speed;
    if(b.position.y > 9){ b.position.y = -4; b.position.x = (Math.random()-0.5)*16; }
  });

  // burst particles
  bursts.forEach(p=>{
    p.position.addScaledVector(p.userData.vel, dt);
    p.userData.vel.y -= dt*2;
    p.userData.life -= dt*0.9;
    p.material.opacity = Math.max(p.userData.life,0);
  });
  bursts = bursts.filter(p=>{
    if(p.userData.life<=0){ scene.remove(p); p.geometry.dispose(); p.material.dispose(); return false; }
    return true;
  });

  // chest glow ramps up near the end
  const distToChest = Math.abs(camera.position.z - (treasureZ-6));
  chestGlow.intensity = distToChest < 20 ? (1 - distToChest/20)*2.2 : 0;

  renderer.render(scene, camera);
}
animate();

/* =========================================================
   GAME LOGIC (HUD wiring)
   ========================================================= */
const startScreen = document.getElementById('start-screen');
const hud = document.getElementById('hud');
const victoryScreen = document.getElementById('victory-screen');
const dotsEl = document.getElementById('dots');
const trailText = document.getElementById('trail-text');
const equationEl = document.getElementById('equation');
const feedbackEl = document.getElementById('feedback');
const answersEl = document.getElementById('answers');
const hintToggle = document.getElementById('hint-toggle');
const hintPanel = document.getElementById('hint-panel');
const hintLabel = document.getElementById('hint-label');

/* build progress dots (rebuilt whenever the selection changes) */
function buildDots(){
  dotsEl.innerHTML = '';
  for(let i=0;i<activeTotal;i++){
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-'+i;
    dotsEl.appendChild(d);
  }
}
function refreshDots(){
  for(let i=0;i<activeTotal;i++){
    const d = document.getElementById('dot-'+i);
    d.className = 'dot' + (i<currentIndex ? ' done' : '') + (i===currentIndex ? ' current' : '');
  }
}

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function buildOptions(correct, table){
  const opts = new Set([correct]);
  const distractorPool = [correct-table, correct+table, correct+1, correct-1, correct+2*table, correct-2*table]
    .filter(v => v>0 && v!==correct);
  shuffle(distractorPool);
  for(const d of distractorPool){
    if(opts.size>=3) break;
    opts.add(d);
  }
  while(opts.size<3){ opts.add(Math.floor(Math.random()*96)+1); }
  return shuffle(Array.from(opts));
}

function renderHint(n, table){
  hintPanel.innerHTML = '';
  for(let g=0; g<n; g++){
    const grid = document.createElement('div');
    grid.className = 'hint-group';
    for(let d=0; d<table; d++){
      const dot = document.createElement('div');
      dot.className = 'hint-dot';
      grid.appendChild(dot);
    }
    hintPanel.appendChild(grid);
  }
  hintLabel.textContent = n + ' group' + (n===1?'':'s') + ' of ' + table + ' = ' + (n*table);
}

let currentTableLabel = null;
function loadQuestion(){
  const {table, n} = order[currentIndex];
  const correct = table*n;
  equationEl.textContent = table + ' × ' + n + ' = ?';
  feedbackEl.textContent = '';
  usedFirstTryThisQuestion = true;
  hintShown = false;
  hintPanel.innerHTML = '';
  hintLabel.textContent = '';
  hintToggle.textContent = 'Show me the groups 👀';

  if(table !== currentTableLabel){
    currentTableLabel = table;
    solvedTrail = [];
    trailText.innerHTML = '';
    document.getElementById('trail-table').textContent = table;
  }

  const opts = buildOptions(correct, table);
  answersEl.innerHTML = '';
  opts.forEach(val=>{
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = val;
    btn.addEventListener('click', ()=> onAnswer(val, correct, btn, table, n));
    answersEl.appendChild(btn);
  });

  refreshDots();
  renderHint(0, table); // cleared, shown on demand via toggle
}

hintToggle.addEventListener('click', ()=>{
  hintShown = !hintShown;
  const {table, n} = order[currentIndex];
  if(hintShown){
    renderHint(n, table);
    hintToggle.textContent = 'Hide the groups';
  } else {
    hintPanel.innerHTML = '';
    hintLabel.textContent = '';
    hintToggle.textContent = 'Show me the groups 👀';
  }
});

function onAnswer(val, correct, btn, table, n){
  if(val === correct){
    playCorrect();
    btn.classList.add('correct');
    if(usedFirstTryThisQuestion) firstTryCorrectCount++;
    feedbackEl.textContent = 'Yes! ' + table + ' × ' + n + ' = ' + correct + ' 🎉';
    solvedTrail.push(correct);
    trailText.innerHTML = solvedTrail.map((v,i)=> i===solvedTrail.length-1 ? '<b>'+v+'</b>' : v).join(' → ');

    triggerCelebration();
    const gate = gates[currentIndex];
    gate.material.color.set(0xFFC857);
    spawnBurst(gate.position.clone(), 0xFFC857);

    // disable buttons during travel
    Array.from(answersEl.children).forEach(b=> b.disabled = true);

    const isLast = currentIndex === activeTotal-1;
    const targetZ = isLast ? (treasureZ - 6 + 9) : restZFor(currentIndex+1);
    const dist = Math.abs(camera.position.z - targetZ);
    const duration = Math.min(Math.max(dist/16, 1.1), 2.6);

    setTimeout(()=>{
      travelTo(targetZ, duration, ()=>{
        currentIndex++;
        if(currentIndex >= activeTotal){
          showVictory();
        } else {
          loadQuestion();
        }
      });
    }, 550);

  } else {
    playWrong();
    usedFirstTryThisQuestion = false;
    btn.classList.add('wrong');
    feedbackEl.textContent = 'Not quite — give it another try! 🐠';
    setTimeout(()=> btn.classList.remove('wrong'), 400);
  }
}

function showVictory(){
  playWin();
  hud.classList.add('hidden');
  const pct = firstTryCorrectCount/activeTotal;
  const starCount = pct>=0.9 ? 3 : (pct>=0.6 ? 2 : 1);
  document.getElementById('stars').textContent = '⭐'.repeat(starCount) + '☆'.repeat(3-starCount);
  const tableDesc = selectedTable === 'all' ? '2 through 9 times table' : (selectedTable + ' times table');
  document.getElementById('victory-text').textContent =
    'You solved every ' + tableDesc + ' fact and unlocked the ocean treasure! First-try score: ' + firstTryCorrectCount + '/' + activeTotal + '.';
  victoryScreen.classList.remove('hidden');
}

const startBtn = document.getElementById('start-btn');
const selectionLabel = document.getElementById('selection-label');

document.querySelectorAll('.table-chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.table-chip').forEach(c=> c.classList.remove('selected'));
    chip.classList.add('selected');
    const val = chip.dataset.table;
    selectedTable = val === 'all' ? 'all' : parseInt(val, 10);
    selectionLabel.textContent = selectedTable === 'all'
      ? 'All tables selected: 2 through 9'
      : selectedTable + ' times table selected';
    startBtn.classList.remove('hidden');
  });
});

function beginGame(){
  order = buildOrder(selectedTable);
  activeTotal = order.length;
  currentIndex = 0;
  firstTryCorrectCount = 0;
  solvedTrail = [];
  currentTableLabel = null;
  trailText.innerHTML = '';

  treasureZ = -(activeTotal+1)*GATE_SPACING;
  chestGroup.position.z = treasureZ - 6;

  gates.forEach(g=> g.material.color.set(0xFF6B6B));
  camera.position.z = restZFor(0);

  buildDots();
  loadQuestion();
}

document.getElementById('start-btn').addEventListener('click', ()=>{
  ensureAudio();
  startScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  beginGame();
});

document.getElementById('replay-btn').addEventListener('click', ()=>{
  victoryScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  beginGame();
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caesar Cipher Step-by-Step Visualizer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'media' };
</script>
<style>
  .letter {
    display: inline-block;
    font-weight: bold;
    transition: transform 0.3s ease, color 0.3s ease;
  }
  .original {
    color: #0275d8; /* blue */
  }
  .shifted {
    color: #d9534f; /* red */
    transform: translateY(-10px);
  }
  .current-step {
    background-color: #fbbf24; /* yellow highlight */
    border-radius: 4px;
    padding: 2px 4px;
  }
</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 flex justify-center min-h-screen py-12">

<div class="bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-6 sm:p-8 rounded-xl shadow-lg w-full max-w-lg my-8 flex flex-col">
  
  <h1 class="text-2xl sm:text-3xl font-bold mb-6 text-center">Caesar Cipher Step-by-Step</h1>
  
  <div class="mb-4">
    <label class="block mb-1 font-semibold">Plaintext:</label>
    <input type="text" id="plaintext" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-500 focus:outline-none bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100" placeholder="Enter text">
  </div>
  
  <div class="mb-4">
    <label class="block mb-1 font-semibold">Shift Number:</label>
    <input type="number" id="shift" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-500 focus:outline-none bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100" placeholder="Enter shift (e.g., 3)">
  </div>
  
  <button id="prepareBtn" class="w-full bg-blue-500 dark:bg-blue-600 hover:bg-blue-600 dark:hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition-all transform hover:scale-105 mb-4">
    Prepare Steps
  </button>

  <div class="mt-4">
    <h2 class="text-xl font-semibold mb-2">Step-by-Step Explanation:</h2>
    <div id="steps" class="p-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-lg font-mono min-h-[150px] overflow-auto"></div>
  </div>
  
  <div class="mt-4 flex gap-2">
    <button id="prevStep" class="flex-1 bg-gray-400 dark:bg-gray-600 text-white p-2 rounded-lg font-bold disabled:opacity-50">Previous Step</button>
    <button id="nextStep" class="flex-1 bg-green-500 dark:bg-green-600 text-white p-2 rounded-lg font-bold disabled:opacity-50">Next Step</button>
  </div>
  
  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">Encrypted Text:</h2>
    <div id="output" class="p-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-lg font-mono min-h-[50px] flex flex-wrap gap-2"></div>
  </div>
  
</div>


<script src="script.js"></script>
</body>
</html>

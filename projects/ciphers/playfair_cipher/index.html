<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playfair Cipher Step-by-Step Visualizer</title>
<script defer src="script.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'media' };
</script>
<style>
  .matrix-grid {
    display: grid;
    grid-template-columns: repeat(5, 50px);
    grid-template-rows: repeat(5, 50px);
    gap: 4px;
    justify-content: start;
    margin-bottom: 1rem;
  }
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-weight: bold;
    font-size: 1.2rem;
    transition: background-color 0.3s, transform 0.3s;
  }
  .matrix-cell {
    background-color: #f0f0f0;
    color: #333;
  }
  .matrix-cell.dark {
    background-color: #2c2c2c;
    color: #eee;
  }
  .highlight {
    background-color: #d9534f !important;
    color: white !important;
    transform: scale(1.2);
  }

  /* Output letters with padding */
  #output {
    display: flex;
    flex-wrap: wrap;
    gap: 8px; /* space between letters */
    padding: 8px 12px; /* inner padding for the container */
  }
  .output-cell {
    background-color: #0275d8;
    color: white;
    padding: 0.5rem 0.7rem; /* gives space inside each letter box */
    border-radius: 6px;
    font-weight: bold;
    font-size: 1.2rem;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  /* Optional: add a subtle shadow to output letters */
  .output-cell:hover {
    transform: scale(1.1);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
</style>

</head>
<body class="bg-gray-100 dark:bg-gray-900 flex justify-center min-h-screen py-12">

<div class="bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-6 sm:p-8 rounded-xl shadow-lg w-full max-w-4xl my-8">
  <h1 class="text-2xl sm:text-3xl font-bold mb-6 text-center">
    Playfair Cipher Step-by-Step Visualizer
  </h1>

  <div class="grid gap-4 sm:grid-cols-2">
    <div>
      <label class="block mb-1 font-semibold">Plaintext:</label>
      <input type="text" id="plaintext" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-500 focus:outline-none bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100" placeholder="Enter text">
    </div>

    <div>
      <label class="block mb-1 font-semibold">Key:</label>
      <input type="text" id="key" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-500 focus:outline-none bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100" placeholder="Enter key phrase">
    </div>
  </div>

  <button id="prepareBtn" class="w-full mt-4 bg-blue-500 dark:bg-blue-600 hover:bg-blue-600 dark:hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition-all transform hover:scale-105">
    Prepare Steps
  </button>

  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">5x5 Key Matrix:</h2>
    <div id="matrix" class="matrix-grid"></div>
  </div>

  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">Step-by-Step Explanation:</h2>
    <div id="steps" class="p-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-lg font-mono min-h-[150px] space-y-2 overflow-auto"></div>
  </div>

  <div class="mt-6 flex gap-2">
    <button id="prevStep" class="flex-1 bg-gray-400 dark:bg-gray-600 text-white p-2 rounded-lg font-bold disabled:opacity-50">Previous Step</button>
    <button id="nextStep" class="flex-1 bg-green-500 dark:bg-green-600 text-white p-2 rounded-lg font-bold disabled:opacity-50">Next Step</button>
  </div>

  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">Ciphertext:</h2>
    <div id="output" class="p-4 px-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-lg font-mono min-h-[50px] flex flex-wrap gap-2 overflow-x-auto"></div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rail Fence Cipher Visualizer</title>
<script defer src="script.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = { darkMode: 'media' };
</script>
<style>
  .cell {
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 1px;
    border-radius: 4px;
    font-weight: bold;
    transition: background-color 0.3s, transform 0.3s;
  }
  .filled {
    background-color: #d9534f;
    color: white;
    transform: scale(1.2);
  }
  .empty {
    background-color: #f0f0f0;
    color: #999;
  }
  .dark .empty {
    background-color: #2c2c2c;
    color: #666;
  }
</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 flex justify-center min-h-screen py-12">

<div class="bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-6 sm:p-8 rounded-xl shadow-lg w-full max-w-4xl my-8">
  <h1 class="text-2xl sm:text-3xl font-bold mb-6 text-center">
    Rail Fence Cipher Visualizer (Step-by-Step)
  </h1>

  <div class="grid gap-4 sm:grid-cols-2">
    <div>
      <label class="block mb-1 font-semibold">Plaintext:</label>
      <input type="text" id="plaintext" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-500 focus:outline-none bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100" placeholder="Enter text">
    </div>

    <div>
      <label class="block mb-1 font-semibold">Number of Rails:</label>
      <input type="number" id="rails" min="2" max="10" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-500 focus:outline-none bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100" placeholder="2-10">
    </div>
  </div>

  <button id="encryptBtn" class="w-full mt-4 bg-blue-500 dark:bg-blue-600 hover:bg-blue-600 dark:hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition-all transform hover:scale-105">
    Encrypt
  </button>

  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">Rail Matrix (Zig-Zag):</h2>
    <div id="railMatrix" class="p-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-lg font-mono overflow-auto"></div>
  </div>

  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">Step-by-Step Explanation:</h2>
    <div id="steps" class="p-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-lg font-mono min-h-[100px] space-y-2 overflow-auto"></div>
  </div>

  <div class="mt-6">
    <h2 class="text-xl font-semibold mb-2">Ciphertext:</h2>
    <div id="output" class="p-4 border rounded-lg bg-gray-50 dark:bg-gray-700 text-lg font-mono min-h-[50px] flex flex-wrap gap-2 overflow-x-auto"></div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DES Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>DES Encryption Visualizer</h1>

    <input type="text" id="plaintextInput" placeholder="Enter plaintext (HEX)">
<input type="text" id="keyInput" placeholder="Enter key (HEX)">
<button id="startBtn">Encrypt & Decrypt</button>

<h3>Ciphertext (HEX): <span id="ciphertextOutput"></span></h3>
<h3>Decrypted (HEX): <span id="decryptedOutput"></span></h3>

</div>

<script src="main.js"></script>
</body>
</html>
